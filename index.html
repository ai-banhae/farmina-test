let stack=[], cur='start';
const TOTAL=4;

function stepNum(id){
  const puppy =['start','puppy_weight','puppy_age','puppy_allergy'];
  const adult =['start','adult_senior','adult_picky','adult_concern'];
  const senior=['start','adult_senior','senior_concern'];
  const path=[...stack, id];
  if(path.includes('puppy_weight')||path.includes('puppy_age')||path.includes('puppy_allergy'))
    return puppy.indexOf(id)+1||1;
  if(path.includes('senior_concern'))
    return senior.indexOf(id)>=0 ? senior.indexOf(id)+1 : senior.length;
  if(path.includes('adult_picky')||path.includes('adult_concern'))
    return adult.indexOf(id)>=0 ? adult.indexOf(id)+1 : adult.length;
  return ['start','adult_senior','adult_picky','adult_concern'].indexOf(id)+1||1;
}

function switchTab(t){
  ['quiz','flow'].forEach(s=>{
    document.getElementById('tab-'+s).classList.toggle('active',s===t);
    document.getElementById('section-'+s).classList.toggle('hidden',s!==t);
  });
}
function openLightbox(){
  const img=document.querySelector('.flow-img-wrap img');
  if(!img||img.style.display==='none') return;
  document.getElementById('lb-img').src=img.src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

function render(){
  const s=STEPS[cur];
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('result').innerHTML='';
  const prog=document.getElementById('prog');
  prog.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='ps'+(i<stepNum(cur)?' on':'');
    prog.appendChild(d);
  }
  document.getElementById('quiz').innerHTML=`
    <div class="qcard">
      <div class="qstep">${s.step}</div>
      <div class="qtitle">${s.title}</div>
      ${s.sub?`<div class="qsub">${s.sub}</div>`:''}
      <div class="opts">
        ${s.opts.map((o,i)=>`
          <button class="opt" onclick="choose(${i})">
            <span class="oi">${o.icon||''}</span>
            <div><div class="ol">${o.label}</div>${o.desc?`<div class="od">${o.desc}</div>`:''}</div>
          </button>`).join('')}
      </div>
    </div>
    ${stack.length?`<button class="btn btn-back" style="width:100%;margin-top:8px" onclick="goBack()">← 이전으로</button>`:''}`;
}

function choose(i){
  const opt=STEPS[cur].opts[i];
  stack.push(cur);
  opt.result ? showResult(opt.result) : (cur=opt.next, render());
}
function goBack(){if(stack.length){cur=stack.pop();render();}}

function showResult(res){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('prog').innerHTML=Array(TOTAL).fill('<div class="ps on"></div>').join('');
  const el=document.getElementById('result');
  el.classList.remove('hidden');

  if(res.notice){
    el.innerHTML=`
      <div class="notice-card">
        <div class="ne">🐕</div>
        <div class="nt">파미나 퍼피 라인은<br>15kg 이하 퍼피에게 적합해요</div>
        <div class="ns">대형견 퍼피의 경우 파미나 퍼피 라인 급여가 권장되지 않아요.<br>생후 12개월 이후 어덜트 라인으로 시작해 주세요 😊</div>
        <div class="action-row" style="margin-top:22px">
          <button class="btn btn-back" onclick="goBack()">← 이전으로</button>
          <button class="btn btn-reset" onclick="reset()">↺ 다시하기</button>
        </div>
      </div>`;
    return;
  }

  let html=`
    <div class="rhead">
      <h2>${res.label}</h2>
      <p>${res.sub||'우리 아이에게 딱 맞는 파미나 사료예요'}</p>
    </div>`;

  res.groups.forEach(g=>{
    html+=`<div class="fgroup"><span class="glabel">${g.label}</span>`;
    g.items.forEach(it=>{
      const f=F[it.f];
      const rbTxt=it.r===1?'1순위':it.r===2?'2순위':'';
      const rbCls=it.r===1?'rb1':'rb2';
      let badges='';
      (f.badges||[]).forEach(b=>{
        if(b==='lid')  badges+=`<span class="badge b-lid">${f.lidTxt||'LID'}</span>`;
        if(b==='prem') badges+=`<span class="badge b-prem">${f.premTxt}</span>`;
        if(b==='val')  badges+=`<span class="badge b-val">${f.valTxt}</span>`;
        if(b==='kibo') badges+=`<span class="badge b-kibo">${f.kiboTxt}</span>`;
      });
      html+=`
        <div class="fcard${it.r===1?' r1':''}">
          <div class="fcard-img">
            ${rbTxt?`<span class="rbadge ${rbCls}">${rbTxt}</span>`:''}
            <img src="${f.img}" alt="${f.name}" loading="lazy" onerror="this.style.opacity='.25'">
            ${it.note?`<div class="note-overlay">✓ ${it.note}</div>`:''}
          </div>
          <div class="fcard-body">
            <div class="fname">${f.name.replace(/([[\]&·])/g,'<span class="sym">$1</span>')}</div>
            ${f.pct?`<div class="fpct">${f.pct}</div>`:''}
            <div class="fdesc">${f.desc}</div>
            ${badges?`<div class="fbadges">${badges}</div>`:''}
            <a href="${f.link}" target="_blank" rel="noopener" class="buy-btn">반해에서 더 자세히 보기 🛒</a>
          </div>
        </div>`;
    });
    html+='</div>';
  });

  html+=`
    <div class="action-row" style="margin-top:6px;margin-bottom:20px;">
      <button class="btn btn-back" onclick="goBack()">← 이전</button>
      <button class="btn btn-reset" onclick="reset()">↺ 다시하기</button>
    </div>`;

  el.innerHTML=html;
}

function reset(){
  stack=[];cur='start';
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  render();
}

render();
</script>
